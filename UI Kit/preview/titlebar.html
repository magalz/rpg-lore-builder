<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  @font-face { font-family: 'Avenir Next LT Pro Cn'; src: url('../fonts/AvenirNextLTPro-DemiCn.otf') format('opentype'); font-weight: 600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1e; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(78,207,198,0.5); margin-bottom: 8px; }

  .titlebar {
    height: 32px;
    background: rgba(8,6,22,0.95);
    border-bottom: 1px solid rgba(78,207,198,0.18);
    display: flex;
    align-items: center;
    padding: 0 12px;
    user-select: none;
    position: relative;
  }
  .titlebar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 3px);
    pointer-events: none;
  }
  .tb-logo { display: flex; align-items: center; gap: 6px; }
  .tb-logo img { height: 18px; width: 18px; object-fit: contain; }
  .tb-title { font-family: 'Avenir Next LT Pro Cn', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.1em; color: rgba(196,174,255,0.7); text-transform: uppercase; }
  .tb-drag { flex: 1; /* -webkit-app-region: drag */ }
  .tb-controls { display: flex; gap: 6px; align-items: center; z-index: 1; }
  .tb-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; position: relative; transition: all 0.15s; }
  .tb-btn:hover { transform: scale(1.15); filter: brightness(1.3); }
  .tb-close    { background: rgba(200,50,50,0.7);  border: 1px solid rgba(200,50,50,0.9); }
  .tb-minimize { background: rgba(196,174,255,0.4); border: 1px solid rgba(196,174,255,0.6); }
  .tb-maximize { background: rgba(78,207,198,0.4);  border: 1px solid rgba(78,207,198,0.6); }
  .tb-version { font-size: 9px; letter-spacing: 0.08em; color: rgba(136,116,204,0.5); z-index: 1; margin-right: 12px; font-family: monospace; }

  /* Alternate — minimal line style */
  .titlebar-alt {
    height: 32px;
    background: #06040f;
    border-bottom: 1px solid rgba(78,207,198,0.12);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .tb-dot { width: 6px; height: 6px; border-radius: 1px; transform: rotate(45deg); }
</style>
</head>
<body>
  <div>
    <div class="label">Titlebar — Default (scanline + glow)</div>
    <div class="titlebar">
      <div class="tb-logo">
        <img src="../assets/logo.png" alt="RPG Lore Builder">
        <span class="tb-title">LORE SANCTUM</span>
      </div>
      <div class="tb-drag"></div>
      <span class="tb-version">v2.0.0</span>
      <div class="tb-controls">
        <button class="tb-btn tb-minimize" title="Minimize"></button>
        <button class="tb-btn tb-maximize" title="Maximize"></button>
        <button class="tb-btn tb-close" title="Close"></button>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Titlebar — Minimal</div>
    <div class="titlebar-alt">
      <div class="tb-dot" style="background:#4ecfc6"></div>
      <span style="font-family:'Avenir Next LT Pro Cn',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.14em;color:rgba(78,207,198,0.6);text-transform:uppercase">RPG LORE BUILDER</span>
      <div style="flex:1"></div>
      <span style="font-size:9px;color:rgba(136,116,204,0.4);font-family:monospace">LORE SANCTUM · v2.0</span>
      <div style="display:flex;gap:5px;margin-left:12px">
        <div style="width:10px;height:10px;border-radius:2px;background:rgba(200,50,50,0.5);border:1px solid rgba(200,50,50,0.7)"></div>
        <div style="width:10px;height:10px;border-radius:2px;background:rgba(196,174,255,0.25);border:1px solid rgba(196,174,255,0.4)"></div>
        <div style="width:10px;height:10px;border-radius:2px;background:rgba(78,207,198,0.25);border:1px solid rgba(78,207,198,0.4)"></div>
      </div>
    </div>
  </div>
</body>
</html>
