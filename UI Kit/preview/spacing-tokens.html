<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Regular.otf') format('opentype'); font-weight: 400; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 20px; }
  .section { margin-bottom: 20px; }
  .section-title { color: rgba(205,202,233,0.5); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .space-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .bar { background: linear-gradient(90deg, #6b4ff0, #948fff); border-radius: 2px; height: 14px; }
  .space-label { font-size: 9px; color: rgba(205,202,233,0.5); width: 80px; flex-shrink: 0; }
  .radius-row { display: flex; gap: 12px; align-items: flex-end; }
  .radius-box { background: #191a32; border: 1px solid rgba(130,114,221,0.4); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; width: 60px; height: 50px; }
  .radius-label { font-size: 9px; color: rgba(205,202,233,0.5); margin-top: 6px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-title">Spacing Scale</div>
    <div class="space-row"><div class="space-label">space-1 · 4px</div><div class="bar" style="width:4px"></div></div>
    <div class="space-row"><div class="space-label">space-2 · 8px</div><div class="bar" style="width:8px"></div></div>
    <div class="space-row"><div class="space-label">space-3 · 12px</div><div class="bar" style="width:12px"></div></div>
    <div class="space-row"><div class="space-label">space-4 · 16px</div><div class="bar" style="width:16px"></div></div>
    <div class="space-row"><div class="space-label">space-5 · 20px</div><div class="bar" style="width:20px"></div></div>
    <div class="space-row"><div class="space-label">space-6 · 24px</div><div class="bar" style="width:24px"></div></div>
    <div class="space-row"><div class="space-label">space-8 · 32px</div><div class="bar" style="width:32px"></div></div>
    <div class="space-row"><div class="space-label">space-10 · 40px</div><div class="bar" style="width:40px"></div></div>
    <div class="space-row"><div class="space-label">space-12 · 48px</div><div class="bar" style="width:48px"></div></div>
    <div class="space-row"><div class="space-label">space-16 · 64px</div><div class="bar" style="width:64px"></div></div>
    <div class="space-row"><div class="space-label">space-20 · 80px</div><div class="bar" style="width:80px"></div></div>
  </div>
  <div class="section">
    <div class="section-title">Border Radius</div>
    <div class="radius-row">
      <div><div class="radius-box" style="border-radius:4px"></div><div class="radius-label">sm · 4px</div></div>
      <div><div class="radius-box" style="border-radius:8px"></div><div class="radius-label">md · 8px</div></div>
      <div><div class="radius-box" style="border-radius:18px"></div><div class="radius-label">lg · 18px</div></div>
      <div><div class="radius-box" style="border-radius:24px"></div><div class="radius-label">xl · 24px</div></div>
      <div><div class="radius-box" style="border-radius:9999px"></div><div class="radius-label">full</div></div>
    </div>
  </div>
</body>
</html>
