<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Bold.otf') format('opentype'); font-weight: 700; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }

  /* Base card */
  .card { background: #111228; border: 1px solid rgba(130,114,221,0.25); border-radius: 8px; padding: 18px; width: 185px; }
  .card-title { font-size: 13px; font-weight: 600; color: #bda5ff; margin-bottom: 6px; }
  .card-body { font-size: 12px; color: rgba(205,202,233,0.6); line-height: 1.6; }

  /* Elevated */
  .card-elevated { background: #191a32; border-color: rgba(130,114,221,0.45); box-shadow: 0 4px 24px rgba(10,11,28,0.7); }

  /* Teal accent */
  .card-teal { border-color: rgba(72,255,218,0.3); }
  .card-teal .card-title { color: #48ffda; }

  /* Glass */
  .card-glass { background: rgba(17,18,40,0.7); backdrop-filter: blur(12px); border-color: rgba(130,114,221,0.4); }

  /* Alert / error */
  .card-alert { background: rgba(139,0,0,0.08); border-color: rgba(220,50,50,0.4); border-radius: 50%; }
  .card-alert .card-title { color: rgba(255,120,120,0.9); }

  /* Input */
  .input-area { background: #111228; border: 1px solid rgba(130,114,221,0.35); border-radius: 8px; padding: 12px 16px; display: flex; gap: 10px; align-items: center; width: 100%; }
  .input-field { flex: 1; background: transparent; border: none; outline: none; color: #eae9ff; font-family: inherit; font-size: 13px; }
  .input-field::placeholder { color: rgba(205,202,233,0.35); }
  .send-btn { background: transparent; border: 1px solid #7b68e8; color: #bda5ff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; transition: all 0.2s; }
  .send-btn:hover { background: #7b68e8; color: #0a0b1c; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-title">Card Default</div>
    <div class="card-body">Componente padrão para informações agrupadas em painel lateral.</div>
  </div>
  <div class="card card-elevated">
    <div class="card-title">Card Elevated</div>
    <div class="card-body">Superfície elevada com sombra mais forte para destaque.</div>
  </div>
  <div class="card card-teal">
    <div class="card-title">Card Teal</div>
    <div class="card-body">Destaque secundário com borda teal, usado para features.</div>
  </div>
  <div class="card card-glass">
    <div class="card-title">Card Glass</div>
    <div class="card-body">Superfície de vidro com backdrop blur para modais e overlays.</div>
  </div>
  <div style="width:100%">
    <div class="input-area">
      <input class="input-field" placeholder="Pergunte ao Cronista..." />
      <button class="send-btn">Enviar ›</button>
    </div>
  </div>
</body>
</html>
