<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 24px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(205,202,233,0.4); margin-bottom: 14px; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .icon-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 72px; padding: 12px 4px; border-radius: 6px; background: #111228; border: 1px solid rgba(130,114,221,0.18); }
  .icon-cell svg { color: #bda5ff; }
  .icon-cell.teal svg { color: #48ffda; }
  .icon-cell.muted svg { color: rgba(205,202,233,0.4); }
  .icon-name { font-size: 9px; color: rgba(205,202,233,0.45); text-align: center; line-height: 1.3; word-break: break-all; }
  .size-row { display: flex; align-items: flex-end; gap: 16px; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .size-label { font-size: 9px; color: rgba(205,202,233,0.4); }
</style>
</head>
<body>
  <div class="section-label">Navigation &amp; Core Icons (Lucide)</div>
  <div class="grid" id="nav-icons"></div>

  <div class="section-label">Agent &amp; Action Icons</div>
  <div class="grid" id="action-icons"></div>

  <div class="section-label">Sizes (Scroll-Text at 12 / 16 / 20 / 32 / 48px)</div>
  <div class="size-row" id="sizes"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const navIcons = [
    ['MessageSquare','Chat'],['Book','Codex'],['Sword','Rituais'],
    ['Sparkles','Logo'],['Compass','Diretório'],['ScrollText','Pergaminho'],
    ['Globe','Idioma'],['Loader2','Carregando'],['Send','Enviar'],
  ];
  const actionIcons = [
    ['Shield','Agente'],['Lock','Auth'],['Terminal','Terminal'],
    ['RefreshCw','Tentar'],['BookOpen','Ler'],['Search','Buscar'],
    ['ChevronRight','Próximo'],['AlertTriangle','Aviso'],['CheckCircle','OK'],
  ];

  function renderIcons(items, containerId, cls = '') {
    const c = document.getElementById(containerId);
    items.forEach(([name, label]) => {
      const cell = document.createElement('div');
      cell.className = 'icon-cell ' + cls;
      const svg = lucide.createElement(lucide[name]);
      svg.setAttribute('width', 20); svg.setAttribute('height', 20); svg.setAttribute('stroke-width', 1.8);
      const span = document.createElement('div');
      span.className = 'icon-name';
      span.textContent = label;
      cell.appendChild(svg); cell.appendChild(span);
      c.appendChild(cell);
    });
  }

  renderIcons(navIcons, 'nav-icons');
  renderIcons(actionIcons, 'action-icons', 'teal');

  const sizes = [12,16,20,32,48];
  const sc = document.getElementById('sizes');
  sizes.forEach(s => {
    const item = document.createElement('div');
    item.className = 'size-item';
    const svg = lucide.createElement(lucide.ScrollText);
    svg.setAttribute('width', s); svg.setAttribute('height', s); svg.setAttribute('stroke-width', 1.8);
    svg.style.color = '#bda5ff';
    const lbl = document.createElement('div');
    lbl.className = 'size-label'; lbl.textContent = s + 'px';
    item.appendChild(svg); item.appendChild(lbl);
    sc.appendChild(item);
  });
});
</script>
</body>
</html>
