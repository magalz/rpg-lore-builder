<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1e; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(78,207,198,0.5); margin-bottom: 10px; }
  .state-box { width: 180px; }

  /* Idle */
  .rune-idle { display: flex; align-items: center; justify-content: center; height: 60px; gap: 12px; }
  .rune-circle { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(136,116,204,0.3); display: flex; align-items: center; justify-content: center; }
  .rune-inner { width: 10px; height: 10px; border-radius: 50%; background: rgba(136,116,204,0.2); }

  /* Thinking */
  @keyframes runeOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes runeOrbitR { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  @keyframes gemPulse { 0%,100% { opacity:0.4; transform:scale(0.85); } 50% { opacity:1; transform:scale(1); } }
  @keyframes ringPulse { 0%,100% { opacity:0.3; } 50% { opacity:0.8; } }

  .rune-thinking { position: relative; width: 64px; height: 64px; margin: 0 auto; }
  .ring { position: absolute; border-radius: 50%; border: 1.5px solid transparent; }
  .ring-outer { inset: 0; border-top-color: #4ecfc6; border-right-color: rgba(78,207,198,0.3); animation: runeOrbit 2s linear infinite; }
  .ring-mid { inset: 8px; border-top-color: rgba(136,116,204,0.8); border-left-color: rgba(136,116,204,0.3); animation: runeOrbitR 1.4s linear infinite; }
  .ring-inner { inset: 18px; border-top-color: #c4aeff; animation: runeOrbit 0.9s linear infinite; }
  .ring-gem { position: absolute; inset: 24px; display: flex; align-items: center; justify-content: center; animation: gemPulse 1.5s ease-in-out infinite; }
  .gem-dot { width: 10px; height: 10px; background: #00e8d8; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 8px #00e8d8; }

  /* Tick marks on outer ring */
  .tick { position: absolute; width: 3px; height: 1px; background: rgba(78,207,198,0.6); transform-origin: left center; }

  /* Waiting state text */
  .thinking-text { text-align: center; font-size: 11px; color: rgba(78,207,198,0.6); letter-spacing: 0.08em; margin-top: 10px; }
  @keyframes blink { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
  .dot-anim { animation: blink 1.4s ease-in-out infinite; }
  .dot-anim:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim:nth-child(3) { animation-delay: 0.4s; }

  /* Error state */
  .rune-error { display: flex; align-items: center; justify-content: center; height: 60px; }
  .error-ring { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(200,50,50,0.6); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(200,50,50,0.2); animation: ringPulse 2s ease-in-out infinite; }
  .error-inner { font-size: 20px; color: rgba(255,100,100,0.8); line-height: 1; }

  /* Success */
  .rune-success { display: flex; align-items: center; justify-content: center; height: 60px; }
  .success-ring { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid rgba(78,207,198,0.7); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 14px rgba(0,232,216,0.3); }
  .success-check { width: 16px; height: 16px; border-right: 2px solid #00e8d8; border-bottom: 2px solid #00e8d8; transform: rotate(45deg) translate(-3px,-3px); }
</style>
</head>
<body>
  <div class="state-box">
    <div class="label">Idle — Dim Runes</div>
    <div class="rune-idle">
      <div class="rune-circle"><div class="rune-inner"></div></div>
      <div class="rune-circle" style="border-color:rgba(136,116,204,0.25)"><div class="rune-inner" style="opacity:0.5"></div></div>
      <div class="rune-circle" style="border-color:rgba(136,116,204,0.2)"><div class="rune-inner" style="opacity:0.3"></div></div>
    </div>
  </div>

  <div class="state-box">
    <div class="label">Thinking — Orbital Rings</div>
    <div class="rune-thinking">
      <div class="ring ring-outer"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-inner"></div>
      <div class="ring-gem"><div class="gem-dot"></div></div>
    </div>
    <div class="thinking-text">
      Consultando<span class="dot-anim">.</span><span class="dot-anim">.</span><span class="dot-anim">.</span>
    </div>
  </div>

  <div class="state-box">
    <div class="label">Error — Auth / Fail</div>
    <div class="rune-error">
      <div class="error-ring"><div class="error-inner">✕</div></div>
    </div>
    <div style="text-align:center;font-size:11px;color:rgba(200,50,50,0.7);margin-top:8px;letter-spacing:0.05em">Acesso Negado</div>
  </div>

  <div class="state-box">
    <div class="label">Success — Compiled</div>
    <div class="rune-success">
      <div class="success-ring"><div class="success-check"></div></div>
    </div>
    <div style="text-align:center;font-size:11px;color:rgba(78,207,198,0.7);margin-top:8px;letter-spacing:0.05em">Compilado</div>
  </div>
</body>
</html>
