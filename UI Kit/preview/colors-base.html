<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .swatch { border-radius: 6px; height: 56px; display: flex; flex-direction: column; justify-content: flex-end; padding: 4px 6px; }
  .swatch-label { font-size: 9px; font-weight: 600; letter-spacing: 0.04em; color: rgba(255,255,255,0.7); line-height: 1.3; }
  .swatch-val { font-size: 8px; color: rgba(255,255,255,0.45); }
  .section-title { color: rgba(205,202,233,0.5); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; margin-top: 14px; }
</style>
</head>
<body>
  <div class="section-title">Backgrounds</div>
  <div class="grid" style="grid-template-columns: repeat(5,1fr); margin-bottom:16px;">
    <div class="swatch" style="background:#05060e;border:1px solid #1a1b35"><div class="swatch-label">void</div><div class="swatch-val">#05060e</div></div>
    <div class="swatch" style="background:#0a0b1c;border:1px solid #1a1b35"><div class="swatch-label">deep</div><div class="swatch-val">#0a0b1c</div></div>
    <div class="swatch" style="background:#111228;border:1px solid #1a1b35"><div class="swatch-label">panel</div><div class="swatch-val">#111228</div></div>
    <div class="swatch" style="background:#191a32;border:1px solid #1a1b35"><div class="swatch-label">surface</div><div class="swatch-val">#191a32</div></div>
    <div class="swatch" style="background:rgba(10,11,28,0.85);border:1px solid rgba(130,114,221,0.3)"><div class="swatch-label">overlay</div><div class="swatch-val">rgba glass</div></div>
  </div>

  <div class="section-title">Purple Scale</div>
  <div class="grid" style="margin-bottom:16px;">
    <div class="swatch" style="background:#1a0d3d"><div class="swatch-label">950</div><div class="swatch-val">#1a0d3d</div></div>
    <div class="swatch" style="background:#3a2985"><div class="swatch-label">900</div><div class="swatch-val">#3a2985</div></div>
    <div class="swatch" style="background:#442ea0"><div class="swatch-label">800</div><div class="swatch-val">#442ea0</div></div>
    <div class="swatch" style="background:#6b4ff0"><div class="swatch-label">600</div><div class="swatch-val">#6b4ff0</div></div>
    <div class="swatch" style="background:#7b68e8"><div class="swatch-label">500</div><div class="swatch-val">#7b68e8</div></div>
    <div class="swatch" style="background:#948fff"><div class="swatch-label">400</div><div class="swatch-val">#948fff</div></div>
    <div class="swatch" style="background:#bda5ff"><div class="swatch-label">300</div><div class="swatch-val">#bda5ff</div></div>
    <div class="swatch" style="background:#d4ccff"><div class="swatch-label">200</div><div class="swatch-val">#d4ccff</div></div>
    <div class="swatch" style="background:#eae9ff"><div class="swatch-label">100</div><div class="swatch-val">#eae9ff</div></div>
  </div>

  <div class="section-title">Teal Scale</div>
  <div class="grid" style="grid-template-columns: repeat(5,1fr);">
    <div class="swatch" style="background:#288474"><div class="swatch-label">700</div><div class="swatch-val">#288474</div></div>
    <div class="swatch" style="background:#06bc98"><div class="swatch-label">500</div><div class="swatch-val">#06bc98</div></div>
    <div class="swatch" style="background:#48ffda"><div class="swatch-label" style="color:#0a0b1c">300</div><div class="swatch-val" style="color:rgba(10,11,28,0.6)">#48ffda</div></div>
    <div class="swatch" style="background:#b9ffe9"><div class="swatch-label" style="color:#0a0b1c">200</div><div class="swatch-val" style="color:rgba(10,11,28,0.6)">#b9ffe9</div></div>
    <div class="swatch" style="background:#e4fff6"><div class="swatch-label" style="color:#0a0b1c">100</div><div class="swatch-val" style="color:rgba(10,11,28,0.6)">#e4fff6</div></div>
  </div>
</body>
</html>
