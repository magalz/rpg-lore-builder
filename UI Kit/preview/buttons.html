<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Bold.otf') format('opentype'); font-weight: 700; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; padding: 24px; }
  .group { margin-bottom: 20px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(205,202,233,0.4); margin-bottom: 10px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* Button base */
  .btn { display: inline-flex; align-items: center; gap: 8px; border-radius: 18px; height: 48px; padding: 0 28px; font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.02em; text-decoration: none; border: 1px solid transparent; }

  /* Primary */
  .btn-primary { background: rgba(69,28,255,0.08); border-color: rgba(130,114,221,0.68); color: rgb(205,198,255); box-shadow: inset 0 0 15px 1px rgba(97,27,255,0.25), 0 10px 40px 0 rgba(15,7,49,0.32); }
  .btn-primary:hover { background: rgba(75,38,200,0.31); border-color: rgb(162,143,249); box-shadow: inset 0 0 15px 1px rgba(111,65,240,0.39), 0 0 7px 0 rgb(101,49,255); color: #eae9ff; }

  /* Solid CTA */
  .btn-solid { background: linear-gradient(135deg, rgba(64,92,228,0.35) 0%, rgba(88,45,225,0.3) 50%, rgba(151,78,227,0.38) 100%); border-color: rgba(217,197,255,0.41); color: rgb(205,198,255); box-shadow: inset 0 0 15px 1px rgba(97,27,255,0.25), 0 10px 40px 0 rgba(15,7,49,0.32); }
  .btn-solid:hover { border-color: rgb(162,143,249); box-shadow: inset 0 0 20px 1px rgba(111,65,240,0.45), 0 0 10px 0 rgb(101,49,255); color: #eae9ff; }

  /* Teal */
  .btn-teal { background: rgba(40,132,118,0.12); border-color: rgba(72,255,218,0.35); color: rgb(185,255,233); box-shadow: inset 0 0 15px 1px rgba(40,132,118,0.2); }
  .btn-teal:hover { background: rgba(40,132,118,0.25); border-color: rgba(72,255,218,0.7); box-shadow: inset 0 0 15px 1px rgba(40,132,118,0.35), 0 0 8px 0 rgba(40,132,118,0.5); color: #e4fff6; }

  /* Ghost */
  .btn-ghost { background: rgba(148,143,255,0.04); border-color: rgba(199,192,255,0.35); color: rgba(205,198,255,0.7); box-shadow: inset 0 0 10px 1px rgba(255,255,255,0.06); }
  .btn-ghost:hover { background: rgba(148,143,255,0.1); border-color: rgba(199,192,255,0.6); color: rgb(205,198,255); }

  /* Danger */
  .btn-danger { background: rgba(139,0,0,0.12); border-color: rgba(220,50,50,0.5); color: rgba(255,150,150,0.9); }
  .btn-danger:hover { background: rgba(139,0,0,0.25); border-color: rgba(220,50,50,0.8); }

  /* Icon-only */
  .btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 8px; justify-content: center; }

  /* Small */
  .btn-sm { height: 34px; padding: 0 16px; font-size: 13px; border-radius: 10px; }
</style>
</head>
<body>
  <div class="group">
    <div class="label">Primary</div>
    <div class="row">
      <button class="btn btn-primary">Ler a Documentação ›</button>
      <button class="btn btn-primary" style="opacity:0.5" disabled>Desativado</button>
    </div>
  </div>
  <div class="group">
    <div class="label">Solid CTA</div>
    <div class="row">
      <button class="btn btn-solid">Baixar SDK ›</button>
      <button class="btn btn-solid btn-sm">Consultar Agente</button>
    </div>
  </div>
  <div class="group">
    <div class="label">Teal</div>
    <div class="row">
      <button class="btn btn-teal">Guia de Integração ›</button>
      <button class="btn btn-teal btn-sm">Abrir Codex</button>
    </div>
  </div>
  <div class="group">
    <div class="label">Ghost &amp; Danger</div>
    <div class="row">
      <button class="btn btn-ghost">Log In ›</button>
      <button class="btn btn-danger btn-sm">Remover Entrada</button>
    </div>
  </div>
</body>
</html>
