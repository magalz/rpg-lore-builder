<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Demi.otf') format('opentype'); font-weight: 600; }
  @font-face { font-family: 'Avenir Next LT Pro'; src: url('../fonts/AvenirNextLTPro-Bold.otf') format('opentype'); font-weight: 700; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b1c; font-family: 'Avenir Next LT Pro', system-ui, sans-serif; }
  .sidebar { width: 260px; background: #111228; border-right: 1px solid rgba(130,114,221,0.2); display: flex; flex-direction: column; padding: 20px; height: 420px; }
  .logo { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .logo-inner { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: #bda5ff; text-transform: uppercase; }
  .logo-icon { width: 20px; height: 20px; color: #bda5ff; }
  .lang-btn { background: transparent; border: 1px solid rgba(130,114,221,0.3); color: rgba(205,202,233,0.5); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: inherit; font-weight: 600; letter-spacing: 0.06em; display: flex; align-items: center; gap: 4px; }
  .nav { list-style: none; display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 4px; cursor: pointer; color: rgba(205,202,233,0.5); font-size: 14px; transition: all 0.2s; }
  .nav-item:hover { background: rgba(212,175,55,0.06); color: #bda5ff; }
  .nav-item.active { background: rgba(107,79,240,0.12); color: #bda5ff; border-left: 2px solid #7b68e8; }
  .nav-icon { width: 18px; height: 18px; opacity: 0.8; }
  .divider { border-top: 1px solid rgba(130,114,221,0.15); padding-top: 14px; margin-top: auto; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(205,202,233,0.35); margin-bottom: 10px; }
  .agent-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 4px; cursor: pointer; color: rgba(205,202,233,0.5); font-size: 13px; }
  .agent-item:hover { color: #bda5ff; }
  .agent-item.active { color: #bda5ff; background: rgba(107,79,240,0.1); }
  svg { flex-shrink: 0; }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-inner">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        LORE SANCTUM
      </div>
      <button class="lang-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
        PT
      </button>
    </div>
    <ul class="nav">
      <li class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Gabinete do Mestre
      </li>
      <li class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        Codex de Lore
      </li>
      <li class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="m13 19 9-10"/><path d="m2 12 9 9"/></svg>
        Rituais
      </li>
    </ul>
    <div class="divider">
      <div class="section-label">Membros do Conselho</div>
      <div class="agent-item active"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Guia</div>
      <div class="agent-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Cronista</div>
      <div class="agent-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Inquisidor</div>
      <div class="agent-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Estrategista</div>
    </div>
  </div>
</body>
</html>
